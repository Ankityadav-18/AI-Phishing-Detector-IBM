<!DOCTYPE html>
<html>
<head>
    <title>AI Phishing Email Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1>🛡️ AI Phishing Email Detector</h1>

    <form method="POST">

        <textarea
        name="email"
        placeholder="Paste Email Here..."
        required></textarea>

        <button type="submit">
            Analyze Email
        </button>

    </form>

    {% if result %}

    <div class="result">
        <h3>{{ result }}</h3>

        <h4>Risk Score: {{ risk_score }}/100</h4>

        <div class="progress mb-3">
    <div class="progress-bar bg-{{ risk_color }}"
         role="progressbar"
         style="width: {{ risk_score }}%;"
         aria-valuenow="{{ risk_score }}"
         aria-valuemin="0"
         aria-valuemax="100">
         {{ risk_score }}%
    </div>
</div>

        {% if threats %}
        <h4>Threat Indicators:</h4>

        <ul>
            {% for threat in threats %}
            <li>{{ threat }}</li>
            {% endfor %}
        </ul>
        {% endif %}

    </div>

    {% endif %}
</div>

</body>
</html>
